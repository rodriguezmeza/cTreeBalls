name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev zlib1g-dev
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build and check the source distribution
        run: |
          python -m pip install --upgrade build twine
          python -m build --sdist
          python -m twine check dist/*
      - name: Test installation from the source distribution
        run: |
          python -m venv /tmp/ctreeballs-test
          /tmp/ctreeballs-test/bin/python -m pip install dist/*.tar.gz
          cd /tmp
          /tmp/ctreeballs-test/bin/python -c "from cyballs import cballs; print(cballs)"
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
